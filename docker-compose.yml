# LoiHub — stack complète pour les collègues.
#
#   docker compose up --build       -> db (restaurée depuis le dump) + front Next 16
#   ouvrir http://localhost:3000
#
# Au 1er démarrage, la base est automatiquement peuplée depuis docker/seed/loihub.sql.gz
# (121k amendements, 577 députés, textes de loi + diffs). Aucun import à lancer.
#
#   docker compose down             -> arrêt (données conservées)
#   docker compose down -v          -> arrêt + reset base (re-restaure le dump au prochain up)

services:
  db:
    image: postgres:17
    container_name: loihub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loihub
    ports:
      - "5432:5432"
    volumes:
      - loihub-db-data:/var/lib/postgresql/data
      # restauration auto au 1er init (postgres exécute les *.sql.gz de ce dossier)
      - ./docker/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loihub"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Moteur de recherche instantanée (lois / amendements / députés).
  # Indexation à lancer une fois les données prêtes :  make index
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: loihub-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-loihub-dev-master-key}"
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - loihub-meili-data:/meili_data
    healthcheck:
      # 127.0.0.1 (pas localhost) : dans le conteneur, localhost résout d'abord en
      # IPv6 ::1 où Meili n'écoute pas (bind 0.0.0.0) -> "connection refused".
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      # laisse Meili démarrer avant de compter les checks comme des échecs
      # (évite un make up en erreur pendant la recréation du conteneur).
      start_period: 15s

  # Indexation automatique de la recherche au démarrage (make up).
  # Attend que db + meilisearch soient sains, indexe les 3 collections
  # (dossiers / amendements / députés), puis se termine (restart: "no").
  # Le service `web` démarre en parallèle sans attendre la fin de l'indexation.
  indexer:
    build:
      context: ./src/front
    container_name: loihub-indexer
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/loihub"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-loihub-dev-master-key}"
      NODE_ENV: production
    command: ["npm", "run", "index:search"]

  web:
    build:
      context: ./src/front
    container_name: loihub-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/loihub"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-loihub-dev-master-key}"
      NODE_ENV: production
      TZ: "Europe/Paris"
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  loihub-db-data:
  loihub-meili-data:
